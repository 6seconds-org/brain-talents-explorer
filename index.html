<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The 18 Brain Talents · Six Seconds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --c-focus: #1d8cc4;
    --c-decisions: #e25c2c;
    --c-drive: #6fb43d;
    --c-text: #1a2a3a;
    --c-muted: #5a6b7a;
    --c-bg: #ffffff;
    --c-border: #e5ebf0;
    --c-hover-bg: #f5f9fc;
    --shadow-modal: 0 18px 60px rgba(20, 40, 60, 0.25);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--c-bg);
    color: var(--c-text);
    font-family: "Open Sans", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 22px 32px;
  }
  header.bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .title h1 {
    font-size: 1.45rem;
    margin: 0 0 2px;
    font-weight: 700;
    color: var(--c-text);
  }
  .title p {
    margin: 0;
    color: var(--c-muted);
    font-size: 0.92rem;
  }
  .lang {
    display: inline-flex;
    border: 1px solid var(--c-border);
    border-radius: 999px;
    overflow: hidden;
    background: #fff;
  }
  .lang button {
    appearance: none;
    border: 0;
    background: transparent;
    padding: 7px 13px;
    font: 600 0.82rem/1 "Open Sans", sans-serif;
    color: var(--c-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang button + button { border-left: 1px solid var(--c-border); }
  .lang button:hover { background: var(--c-hover-bg); color: var(--c-text); }
  .lang button.active { background: var(--c-text); color: #fff; }

  .scale {
    margin-bottom: 14px;
  }
  .scale-bar {
    appearance: none;
    font-family: inherit;
    width: 100%;
    position: relative;
    height: 38px;
    border: 2px solid currentColor;
    background: transparent;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    margin-bottom: 6px;
    color: var(--c-focus);
    cursor: pointer;
    transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
  }
  .scale.decisions .scale-bar { color: var(--c-decisions); }
  .scale.drive .scale-bar { color: var(--c-drive); }
  .scale.focus      .scale-bar:hover, .scale.focus      .scale-bar:focus-visible { background: rgba(29, 140, 196, 0.08); box-shadow: 0 4px 14px rgba(29,140,196,0.15); }
  .scale.decisions  .scale-bar:hover, .scale.decisions  .scale-bar:focus-visible { background: rgba(226, 92, 44, 0.08);  box-shadow: 0 4px 14px rgba(226,92,44,0.15); }
  .scale.drive      .scale-bar:hover, .scale.drive      .scale-bar:focus-visible { background: rgba(111, 180, 61, 0.10); box-shadow: 0 4px 14px rgba(111,180,61,0.18); }
  .scale-bar:hover, .scale-bar:focus-visible { outline: none; transform: translateY(-1px); }
  .scale-bar .scale-name {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.02em;
  }
  .arrow {
    width: 18px;
    height: 18px;
    display: inline-block;
  }
  .scale-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    align-items: start;
    position: relative;
  }
  .scale-row::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 8px;
    bottom: 16px;
    width: 1px;
    background: var(--c-border);
    transform: translateX(-0.5px);
  }
  .talent {
    appearance: none;
    border: 0;
    background: transparent;
    padding: 12px 6px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    color: var(--c-text);
    font-family: inherit;
    min-height: 130px;
  }
  .talent:hover, .talent:focus-visible {
    background: var(--c-hover-bg);
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(20, 40, 60, 0.10);
    outline: none;
  }
  .talent .icon {
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }
  .talent .icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  .talent .label {
    font-size: 0.86rem;
    line-height: 1.2;
    font-weight: 600;
    color: var(--c-text);
  }

  /* Modal */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 25, 40, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 9999;
    animation: fade 0.18s ease;
  }
  .backdrop.open { display: flex; }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: #fff;
    border-radius: 16px;
    box-shadow: var(--shadow-modal);
    max-width: 460px;
    width: 100%;
    padding: 28px 28px 26px;
    text-align: center;
    position: relative;
    animation: pop 0.22s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop {
    from { transform: translateY(8px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .modal .m-icon {
    width: 110px;
    height: 110px;
    margin: 0 auto 14px;
  }
  .modal .m-icon img { width: 100%; height: 100%; object-fit: contain; }
  .modal h2 {
    margin: 0 0 8px;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--c-text);
  }
  .modal .m-cluster {
    display: inline-block;
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
    color: #fff;
    font-weight: 600;
  }
  .modal .m-cluster.focus { background: var(--c-focus); }
  .modal .m-cluster.decisions { background: var(--c-decisions); }
  .modal .m-cluster.drive { background: var(--c-drive); }
  .modal .m-def {
    font-size: 1rem;
    line-height: 1.5;
    color: var(--c-text);
    margin: 0;
  }
  .modal .close-hint {
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--c-muted);
  }

  /* Wider scale modal */
  .modal.scale-modal {
    max-width: 760px;
    text-align: left;
    padding: 30px 32px 28px;
  }
  .modal.scale-modal .sm-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .modal.scale-modal .sm-dot {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    flex: 0 0 auto;
  }
  .modal.scale-modal.focus     .sm-dot { background: var(--c-focus); }
  .modal.scale-modal.decisions .sm-dot { background: var(--c-decisions); }
  .modal.scale-modal.drive     .sm-dot { background: var(--c-drive); }
  .modal.scale-modal h2.sm-title { margin: 0; font-size: 1.7rem; }
  .modal.scale-modal.focus     h2.sm-title { color: var(--c-focus); }
  .modal.scale-modal.decisions h2.sm-title { color: var(--c-decisions); }
  .modal.scale-modal.drive     h2.sm-title { color: var(--c-drive); }
  .modal.scale-modal .sm-question {
    margin: 0 0 18px 58px;
    color: var(--c-text);
    font-size: 0.98rem;
    line-height: 1.45;
  }
  .modal.scale-modal .sm-bar {
    position: relative;
    height: 38px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    color: #fff;
    margin-bottom: 14px;
  }
  .modal.scale-modal.focus     .sm-bar { background: var(--c-focus); }
  .modal.scale-modal.decisions .sm-bar { background: var(--c-decisions); }
  .modal.scale-modal.drive     .sm-bar { background: var(--c-drive); }
  .modal.scale-modal .sm-bar .sm-left-label,
  .modal.scale-modal .sm-bar .sm-right-label {
    font-size: 0.85rem;
    font-weight: 600;
    flex: 1 1 0;
    padding: 0 8px;
  }
  .modal.scale-modal .sm-bar .sm-left-label { text-align: left; }
  .modal.scale-modal .sm-bar .sm-right-label { text-align: right; }
  .modal.scale-modal .sm-bar .sm-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.55);
    flex: 0 0 auto;
  }
  .modal.scale-modal .sm-bar .arrow { color: #fff; }
  .modal.scale-modal .sm-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .modal.scale-modal .sm-pill {
    border-radius: 12px;
    padding: 16px 18px 18px;
    border: 1px solid transparent;
  }
  .modal.scale-modal.focus     .sm-pill { background: #eef6fb; border-color: #cfe6f2; }
  .modal.scale-modal.decisions .sm-pill { background: #fceee8; border-color: #f4cbbb; }
  .modal.scale-modal.drive     .sm-pill { background: #eef6e5; border-color: #d2e6bf; }
  .modal.scale-modal .sm-pill h3 {
    margin: 0 0 6px;
    font-size: 1.05rem;
    font-weight: 700;
  }
  .modal.scale-modal.focus     .sm-pill h3 { color: var(--c-focus); }
  .modal.scale-modal.decisions .sm-pill h3 { color: var(--c-decisions); }
  .modal.scale-modal.drive     .sm-pill h3 { color: var(--c-drive); }
  .modal.scale-modal .sm-pill p {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--c-text);
  }
  .modal.scale-modal .sm-note {
    margin: 16px 0 0;
    padding: 12px 14px;
    background: #f5f8fa;
    border-left: 3px solid var(--c-border);
    border-radius: 6px;
    font-size: 0.88rem;
    color: var(--c-muted);
    line-height: 1.5;
  }
  .modal.scale-modal.focus     .sm-note { border-left-color: var(--c-focus); }
  .modal.scale-modal.decisions .sm-note { border-left-color: var(--c-decisions); }
  .modal.scale-modal.drive     .sm-note { border-left-color: var(--c-drive); }
  @media (max-width: 640px) {
    .modal.scale-modal { padding: 22px 20px 20px; }
    .modal.scale-modal .sm-cols { grid-template-columns: 1fr; }
    .modal.scale-modal h2.sm-title { font-size: 1.35rem; }
    .modal.scale-modal .sm-question { margin-left: 58px; font-size: 0.92rem; }
    .modal.scale-modal .sm-bar .sm-left-label,
    .modal.scale-modal .sm-bar .sm-right-label { font-size: 0.75rem; }
  }

  footer.attrib {
    margin-top: 22px;
    text-align: center;
    color: var(--c-muted);
    font-size: 0.78rem;
  }
  footer.attrib a { color: inherit; }

  @media (max-width: 720px) {
    .wrap { padding: 14px; }
    .scale-row { grid-template-columns: repeat(3, 1fr); row-gap: 0; }
    .scale-row::before { display: none; }
    .talent { min-height: 120px; }
    .talent .icon { width: 60px; height: 60px; }
    .scale-bar { height: 34px; padding: 0 14px; }
    .scale-bar .scale-name { font-size: 0.92rem; }
    .title h1 { font-size: 1.2rem; }
  }
  @media (max-width: 420px) {
    .scale-row { grid-template-columns: repeat(2, 1fr); }
    .talent .label { font-size: 0.8rem; }
  }

  html[lang="zh"] body { font-family: "Noto Sans SC", "Open Sans", sans-serif; }
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="title">
      <h1 data-i18n="title">The 18 Brain Talents</h1>
      <p data-i18n="subtitle">Click any talent to learn more</p>
    </div>
    <nav class="lang" aria-label="Language">
      <button type="button" data-lang="en" class="active">EN</button>
      <button type="button" data-lang="it">IT</button>
      <button type="button" data-lang="zh">中文</button>
      <button type="button" data-lang="es">ES</button>
      <button type="button" data-lang="vi">VI</button>
    </nav>
  </header>

  <section class="scale focus" aria-labelledby="s-focus">
    <button type="button" class="scale-bar" data-scale="focus" aria-label="Focus — click to learn more">
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 6l-6 6 6 6"/></svg>
      <span class="scale-name" id="s-focus" data-i18n="scale.focus">Focus</span>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 6l6 6-6 6"/></svg>
    </button>
    <div class="scale-row" data-row="focus"></div>
  </section>

  <section class="scale decisions" aria-labelledby="s-decisions">
    <button type="button" class="scale-bar" data-scale="decisions" aria-label="Decisions — click to learn more">
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 6l-6 6 6 6"/></svg>
      <span class="scale-name" id="s-decisions" data-i18n="scale.decisions">Decisions</span>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 6l6 6-6 6"/></svg>
    </button>
    <div class="scale-row" data-row="decisions"></div>
  </section>

  <section class="scale drive" aria-labelledby="s-drive">
    <button type="button" class="scale-bar" data-scale="drive" aria-label="Drive — click to learn more">
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 6l-6 6 6 6"/></svg>
      <span class="scale-name" id="s-drive" data-i18n="scale.drive">Drive</span>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 6l6 6-6 6"/></svg>
    </button>
    <div class="scale-row" data-row="drive"></div>
  </section>

  <footer class="attrib">
    <span data-i18n="footer">© Six Seconds — The Emotional Intelligence Network · <a href="https://www.6seconds.org/" target="_blank" rel="noopener">6seconds.org</a></span>
  </footer>
</div>

<div class="backdrop" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="m-name" tabindex="-1">
  <div class="modal">
    <div class="m-icon"><img id="m-icon" src="" alt=""></div>
    <span class="m-cluster" id="m-cluster"></span>
    <h2 id="m-name"></h2>
    <p class="m-def" id="m-def"></p>
    <div class="close-hint" data-i18n="closeHint">Click anywhere to close</div>
  </div>
</div>

<div class="backdrop" id="scale-backdrop" role="dialog" aria-modal="true" aria-labelledby="sm-title" tabindex="-1">
  <div class="modal scale-modal" id="scale-modal">
    <div class="sm-head">
      <div class="sm-dot" aria-hidden="true"></div>
      <h2 class="sm-title" id="sm-title"></h2>
    </div>
    <p class="sm-question" id="sm-question"></p>
    <div class="sm-bar" aria-hidden="true">
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6l-6 6 6 6"/></svg>
      <span class="sm-left-label" id="sm-left-label"></span>
      <span class="sm-divider"></span>
      <span class="sm-right-label" id="sm-right-label"></span>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6l6 6-6 6"/></svg>
    </div>
    <div class="sm-cols">
      <div class="sm-pill">
        <h3 id="sm-left-name"></h3>
        <p id="sm-left-body"></p>
      </div>
      <div class="sm-pill">
        <h3 id="sm-right-name"></h3>
        <p id="sm-right-body"></p>
      </div>
    </div>
    <p class="sm-note" id="sm-note"></p>
    <div class="close-hint" data-i18n="closeHint">Click anywhere to close</div>
  </div>
</div>

/* ----- Render ----- */
const rows = {
  focus: document.querySelector('[data-row="focus"]'),
  decisions: document.querySelector('[data-row="decisions"]'),
  drive: document.querySelector('[data-row="drive"]'),
};

function renderTalents() {
  for (const k of Object.keys(rows)) rows[k].innerHTML = "";
  TALENTS.forEach(t => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "talent";
    btn.dataset.id = t.id;
    btn.dataset.scale = t.scale;
    btn.setAttribute("aria-label", t.id);
    btn.innerHTML =
      `<span class="icon"><img src="talents/${t.id}.svg" alt="" loading="lazy"></span>` +
      `<span class="label" data-label></span>`;
    btn.addEventListener("click", () => openModal(t));
    rows[t.scale].appendChild(btn);
  });
}

/* ----- Language ----- */
let currentLang = "en";
function applyLang(lang) {
  currentLang = lang;
  const dict = I18N[lang];
  document.documentElement.lang = lang;
  // Static text
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    const val = key.split(".").reduce((o, k) => (o ? o[k] : undefined), dict);
    if (val !== undefined) el.innerHTML = val;
  });
  // Talent labels
  document.querySelectorAll(".talent").forEach(btn => {
    const id = btn.dataset.id;
    const tl = dict.talents[id];
    btn.querySelector("[data-label]").textContent = tl.name;
    btn.setAttribute("aria-label", tl.name);
  });
  // Scale-bar aria-labels
  document.querySelectorAll(".scale-bar").forEach(btn => {
    const s = btn.dataset.scale;
    btn.setAttribute("aria-label", dict.scale[s]);
  });
  // Lang button state
  document.querySelectorAll(".lang button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  // Persist
  try { localStorage.setItem("bt_lang", lang); } catch (_) {}
  // If a modal is open, refresh its contents
  if (backdrop.classList.contains("open") && currentTalent) openModal(currentTalent);
  if (scaleBackdrop.classList.contains("open") && currentScale) openScaleModal(currentScale);
}

document.querySelectorAll(".lang button").forEach(btn => {
  btn.addEventListener("click", () => applyLang(btn.dataset.lang));
});

/* ----- Modals ----- */
const backdrop = document.getElementById("backdrop");
const mIcon = document.getElementById("m-icon");
const mName = document.getElementById("m-name");
const mDef  = document.getElementById("m-def");
const mClus = document.getElementById("m-cluster");

const scaleBackdrop = document.getElementById("scale-backdrop");
const scaleModal    = document.getElementById("scale-modal");
const smTitle       = document.getElementById("sm-title");
const smQuestion    = document.getElementById("sm-question");
const smLeftLabel   = document.getElementById("sm-left-label");
const smRightLabel  = document.getElementById("sm-right-label");
const smLeftName    = document.getElementById("sm-left-name");
const smRightName   = document.getElementById("sm-right-name");
const smLeftBody    = document.getElementById("sm-left-body");
const smRightBody   = document.getElementById("sm-right-body");
const smNote        = document.getElementById("sm-note");

let currentTalent = null;
let currentScale  = null;
let lastFocus = null;

function openModal(t) {
  currentTalent = t;
  const dict = I18N[currentLang];
  const tl = dict.talents[t.id];
  mIcon.src = `talents/${t.id}.svg`;
  mIcon.alt = tl.name;
  mName.textContent = tl.name;
  mDef.textContent  = tl.def;
  mClus.textContent = dict.cluster[t.scale];
  mClus.className = "m-cluster " + t.scale;
  if (!backdrop.classList.contains("open")) {
    lastFocus = document.activeElement;
    backdrop.classList.add("open");
    backdrop.focus();
    document.body.style.overflow = "hidden";
  }
}
function closeModal() {
  backdrop.classList.remove("open");
  currentTalent = null;
  if (!scaleBackdrop.classList.contains("open")) {
    document.body.style.overflow = "";
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }
}

function openScaleModal(scaleId) {
  currentScale = scaleId;
  const dict = I18N[currentLang];
  const s = dict.scales[scaleId];
  scaleModal.className = "modal scale-modal " + scaleId;
  smTitle.textContent     = s.name;
  smQuestion.textContent  = s.question;
  smLeftLabel.textContent = s.leftLabel;
  smRightLabel.textContent= s.rightLabel;
  smLeftName.textContent  = s.leftName;
  smRightName.textContent = s.rightName;
  smLeftBody.textContent  = s.leftBody;
  smRightBody.textContent = s.rightBody;
  smNote.textContent      = s.note;
  if (!scaleBackdrop.classList.contains("open")) {
    lastFocus = document.activeElement;
    scaleBackdrop.classList.add("open");
    scaleBackdrop.focus();
    document.body.style.overflow = "hidden";
  }
}
function closeScaleModal() {
  scaleBackdrop.classList.remove("open");
  currentScale = null;
  if (!backdrop.classList.contains("open")) {
    document.body.style.overflow = "";
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }
}

backdrop.addEventListener("click", closeModal);
scaleBackdrop.addEventListener("click", closeScaleModal);
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (scaleBackdrop.classList.contains("open")) closeScaleModal();
  else if (backdrop.classList.contains("open")) closeModal();
});

document.querySelectorAll(".scale-bar").forEach(btn => {
  btn.addEventListener("click", () => openScaleModal(btn.dataset.scale));
});

/* ----- Init ----- */
renderTalents();
let initLang = "en";
try {
  const saved = localStorage.getItem("bt_lang");
  if (saved && I18N[saved]) initLang = saved;
  else {
    const nav = (navigator.language || "en").slice(0, 2).toLowerCase();
    if (I18N[nav]) initLang = nav;
  }
} catch (_) {}
applyLang(initLang);
</script>
</body>
